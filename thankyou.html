<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - EMI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #fff;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(15, 23, 42, 0.9);
  padding: 50px;
  border-radius: 16px;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* ICON */
.icon {
  font-size: 60px;
  margin-bottom: 20px;
}

/* TEXT */
h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  color: #cbd5f5;
  margin-bottom: 25px;
  line-height: 1.6;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 12px 25px;
  background: #38bdf8;
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<div class="card">
  <div class="icon">🎉</div>

  <h1>Thank You!</h1>

  <p>
    Your message has been successfully sent to EMI.<br>
    Our team will get back to you shortly. 🤝
  </p>

  <a href="index.html" class="btn">Back to Home</a>
</div>

</body>
</html>
